<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Optimized abstract portfolio background</title>
  <desc id="desc">Compressed layered blue, violet, and amber gradients over a dark canvas for the Kitipov portfolio.</desc>
  <defs>
    <linearGradient id="base" x1="0" x2="1600" y1="0" y2="1200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.48" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="blue" cx="0" cy="0" r="1" gradientTransform="translate(1210 235) rotate(130) scale(890 560)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa" stop-opacity="0.72"/>
      <stop offset="0.54" stop-color="#2563eb" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="0" cy="0" r="1" gradientTransform="translate(260 310) rotate(42) scale(700 470)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a78bfa" stop-opacity="0.48"/>
      <stop offset="0.58" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amber" cx="0" cy="0" r="1" gradientTransform="translate(1000 1025) rotate(-20) scale(760 320)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#facc15" stop-opacity="0.22"/>
      <stop offset="0.62" stop-color="#f97316" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0v80" fill="none" stroke="#bfdbfe" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="1200" fill="url(#base)"/>
  <rect width="1600" height="1200" fill="url(#blue)"/>
  <rect width="1600" height="1200" fill="url(#violet)"/>
  <rect width="1600" height="1200" fill="url(#amber)"/>
  <rect width="1600" height="1200" fill="url(#grid)"/>
  <path d="M-80 920C180 790 300 840 520 905c280 84 505 62 730-90 150-102 280-128 450-72v457H-80Z" fill="#0f172a" fill-opacity="0.5"/>
</svg>
